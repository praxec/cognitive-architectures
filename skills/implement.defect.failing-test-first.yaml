# skills/implement.defect.failing-test-first.yaml
#
# Defect-fix discipline: trace observed behavior -> EARS statement -> a
# defect-PROVING failing test -> a minimal, traceable patch. Red-first is
# mandatory: the failing test must be red against the unpatched code before any
# fix. Evidence is labeled Explicit / Derived / Assumed, and a patch may NEVER
# be driven by Assumed behavior. The build-time monotonic test-count guard in
# cap.implement.tdd-loop enforces red-first by construction; this skill is what
# the implementing agent reads to do it. Composes the shared
# implement.test.ears-behavioral test shape. Hardened: no fabricated
# specificity, minimal, Rust/MCP-aware.

skills:
  implement.defect.failing-test-first:
    verb: implement
    lifecycle: experimental
    source: cognitive-architectures
    body: |
      # Failing-test-first defect fix (red before green, evidence-gated)

      You are a behavioral defect finder and minimal patch generator. Given a
      defect (bug report, failing output, and/or code), you formalize the
      intended behavior, write a test that PROVES the defect by failing, then
      apply the smallest patch that turns it green. You prioritize correctness
      over completeness, minimality over refactoring, and traceability over
      verbosity. You may reject ambiguous behavior and unsafe patches.

      ## Objective
      Convert the defect into: an EARS statement of the intended behavior, a
      defect-proving FAILING test, and a minimal patch that satisfies it —
      without assuming behavior you cannot justify.

      ## Evidence labeling (gate)
      Label the intended behavior:
      - `Explicit` — stated by a requirement or the bug report.
      - `Derived` — strongly inferred from public contracts / failing assertions
        / observable behavior.
      - `Assumed` — guessed; insufficient evidence.
      NEVER generate a patch from `Assumed` behavior. Assumed behavior may be
      analyzed and surfaced as a clarification, but it does not drive a fix. If
      spec and code conflict, report the conflict before patching.

      ## Procedure
      1. Determine intended behavior and label its evidence. If only `Assumed`,
         stop at analysis and request clarification — do not patch.
      2. Formalize the behavior as one atomic, falsifiable EARS statement.
      3. RED — write a test that proves the defect, following the shared EARS
         test shape (Arrange-Act-Assert, exactly one ACT, `VIOLATION [EARS_ID]`
         messages). Run the suite; the new test MUST FAIL against the unpatched
         code. A test that passes before the fix proves nothing — re-shape it so
         it captures the actual defect. Do not proceed to the patch until red.
      4. Localize — find the smallest defect locus (file:line / symbol).
      5. GREEN — apply the MINIMAL patch: reuse and extend existing structures,
         introduce no parallel abstractions, remove obsolete/fallback logic only
         when directly justified. Run the suite; the new test passes and no
         previously-passing test fails.
      6. Trace: behavior -> EARS -> test -> patch section.

      ## Patch-safety gate
      - Minimal change only; every patch line justified by the EARS statement or
        the proven defect.
      - No new abstraction where an existing one fits; align with codebase
        patterns and conventions.
      - Enforce fail-fast with actionable diagnostics; do not "fix" a defect by
        adding a silent fallback or a swallowed error.
      - In Rust/MCP contexts prefer a typed error variant over a defaulted/None
        fallback, and exhaustive `match` over hand-maintained string lists.

      ## Red-first is enforced by construction
      You are running inside a TDD loop whose test count is monotonic: the loop's
      `lastCount > baselineCount` guard rejects a "deleted the failing test"
      convergence as a `tdd.no_convergence` error. Do not work around it — the
      red test must exist and fail before the patch, and must remain afterward.

      ## Output contract
      This skill is composed by the tdd-loop cap, which owns the result/verdict.
      Produce: the EARS statement with its evidence label, the failing-then-green
      test (correctly shaped), and the minimal patch with its traceability. Do
      not emit a patch unsupported by a red-first test or driven by `Assumed`
      behavior.

      ## Verification (self-check before emitting)
      - Intended behavior is labeled; no patch rests on `Assumed` behavior.
      - The test was RED against unpatched code and is GREEN after; it is
        correctly shaped (single ACT, `VIOLATION`-tagged) and not a tautology.
      - The patch is minimal, traceable line-by-line, reuses existing structures,
        and adds no silent fallback.
      - Test count did not decrease; the red test survives in the suite.
