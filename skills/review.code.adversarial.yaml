# skills/review.code.adversarial.yaml
#
# Lifted verbatim from praxec examples/swe-agent.yaml.
skills:
  review.code.adversarial:
    verb: review
    lifecycle: stable
    source: cognitive-architectures
    body: |
      # Adversarial patch review
      Attack the candidate patch: find missed edge cases, hidden regressions,
      policy violations, security issues. Cite each finding with file:line and
      a counterexample input. Submit a `verdict` (one of: approved |
      needs-revision | rejected) and a `findings` array. Use `approved` only
      when no high-severity finding stands; `rejected` when the patch must not
      land; `needs-revision` when it needs targeted fixes first.
