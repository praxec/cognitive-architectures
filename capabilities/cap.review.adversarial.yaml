# capabilities/cap.review.adversarial.yaml

workflows:
  cap.review.adversarial:
    verb: review
    lifecycle: experimental
    description: >
      Adversarial review of the diff against the declared base ref;
      surface findings + overall verdict.
    snippet:
      inputs:
        diff_against: { type: string, required: true }
        # The repo on disk. Threaded so a grounded adversarial reviewer gets
        # file-tool access (resolves `$.workflow.input.repo_path` in this cap's
        # own scope — the gateway templates the file auto_drive tool against the
        # immediate leaf workflow). OPTIONAL so existing callers stay contract-
        # valid (V30); a delivery entry flow (flow.add-feature) passes it.
        repo_path:    { type: string }
      outputs:
        verdict:  { type: string, enum: [approved, needs-revision, rejected] }
        findings: { type: array }
    skills: [review.code.adversarial]
    initialState: ready
    states:
      ready:
        goal: Attack the diff; cite findings; emit verdict.
        transitions:
          submit_review:
            target: done
            actor: agent
            inputSchema:
              type: object
              required: [verdict]
              properties:
                verdict:  { type: string, enum: [approved, needs-revision, rejected] }
                findings: { type: array, default: [] }
            executor: { kind: noop }
            output:
              verdict:  "$.arguments.verdict"
              findings: "$.arguments.findings"
      done: { terminal: true }
