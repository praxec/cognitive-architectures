# capabilities/cap.plan.test-charter.yaml
#
# Charter step of the E2E discovery loop (flow.qa.explore): mission → a
# BOUNDED, citable coverage charter. Cognitive cap (verb `plan`, V6: noop +
# actor: agent) guided by the `plan.test.charter` skill. No browser here —
# chartering precedes the lease-scoped exploration; the agent's only reach
# is `file:` READ over the target repo so the charter's invariants cite
# REAL docs (spec/ADR/README headings) rather than invented references.
# Those invariants are the only legal `expectedSource` values downstream
# (cap.diagnose.finding), so the citation discipline starts here.
#
# OPERATOR FALSE PREMISES. A mission is an operator's belief about the app,
# and beliefs are wrong. A dogfood mission asserted a tag filter the app
# never had; this cap minted INV-07 around it, the prober dutifully found
# the filter absent, and a wrong assumption was on its way to becoming a
# reported defect. The charter is where that has to stop, because it is the
# only step that reads the repo before anything is judged.
#
# The rule: an invariant may assert how a surface BEHAVES, but the charter
# must not assert that a surface EXISTS on the operator's say-so alone.
# Mission claims whose subject cannot be confirmed in the repo go to the
# required `unverified_premises` channel, which downstream steps are told is
# not an invariant list. This deliberately does NOT touch the `source` enum
# or weaken the citation rules: `charter_invariant` with an honest "no spec
# found" note remains the right answer for real surfaces the docs are
# silent about. The distinction is existence, not documentation.

workflows:
  cap.plan.test-charter:
    verb: plan
    lifecycle: experimental
    description: >
      Turn an open-ended browser-testing mission into a bounded, budgeted
      charter: explicit in-scope and out-of-scope surfaces, invariants each
      citing a source (charter_invariant | acceptance_criterion | spec | adr
      | api_contract | wcag | story), and a page/probe budget — the contract
      every downstream discovery step is scoped and judged against.
    snippet:
      inputs:
        # The open-ended coverage mission (e.g. "test the checkout flow").
        mission:     { type: string, required: true }
        # The app under test — the charter binds scope to this origin.
        app_url:     { type: string, required: true }
        # Optional operator constraints (env caveats, forbidden actions).
        constraints: { type: object, default: {} }
      outputs:
        charter: { type: object }
    skills: [plan.test.charter]
    initialState: chartering
    states:
      chartering:
        goal: >
          Charter a bounded E2E discovery session. Read $.context — the
          mission ($.context.mission), the app under test
          ($.context.app_url), and operator constraints
          ($.context.constraints). Use your file tools to read the target
          repo's specs/ADRs/README before writing invariants, so each
          invariant cites a real reference; where docs are silent, state the
          invariant yourself with source kind `charter_invariant`.

          CHECK THE MISSION'S PREMISES BEFORE MINTING INVARIANTS. The
          mission is what the operator BELIEVES about the app, and it may
          be wrong. Whenever the mission names a specific surface, control,
          route, or feature ("the tag filter", "the export button", "the
          /reports page"), confirm with your file tools that it actually
          exists in the repo — a route definition, a component, a handler, a
          doc that describes it. Then:
            - CONFIRMED to exist → you may mint invariants about how it
              behaves, cited as usual (`charter_invariant` with an honest
              "no spec found" reference is correct when the docs are silent
              about a surface you can see in the code).
            - NOT CONFIRMED → do NOT mint an invariant about it. Put it in
              `unverified_premises` as { premise, why_unverified }. Its
              absence in the running app is then a mistaken operator
              assumption, which is not a defect and must never be reported
              as one.
          Never invent an invariant whose only evidence is that the mission
          mentioned the thing. `unverified_premises` is required and may be
          empty — an empty array is a claim that you checked.

          Emit ONE `charter` object: { mission, in_scope[], out_of_scope[],
          invariants[] each { id, statement, source: { kind, reference } },
          unverified_premises[] each { premise, why_unverified },
          budget: { max_pages, max_probes } }. Name out-of-scope surfaces
          explicitly (destructive operations, third-party frames, real
          payments); keep the budget executable in one session. Submit
          `charter`.
        # File READ over the target repo only — charters cite docs; they do
        # not browse. (Per-state `tools:` REPLACES the gateway-wide set.)
        tools: ["file:{{ $.run.repo_root }}"]
        transitions:
          submit_charter:
            target: done
            actor: agent
            inputSchema:
              type: object
              required: [charter]
              properties:
                charter:
                  type: object
                  required: [mission, in_scope, out_of_scope, invariants, unverified_premises, budget]
                  properties:
                    mission:      { type: string }
                    in_scope:     { type: array, items: { type: string } }
                    out_of_scope: { type: array, items: { type: string } }
                    invariants:
                      type: array
                      items:
                        type: object
                        required: [id, statement, source]
                        properties:
                          id:        { type: string }
                          statement: { type: string }
                          source:
                            type: object
                            required: [kind, reference]
                            additionalProperties: false
                            properties:
                              kind:
                                type: string
                                enum: [charter_invariant, acceptance_criterion, spec, adr, api_contract, wcag, story]
                              reference: { type: string }
                    # Mission claims whose SUBJECT could not be confirmed to
                    # exist in the repo. Required (may be empty) so the
                    # charter cannot stay silent about them, and separate
                    # from `invariants` so no downstream step can treat a
                    # wrong operator assumption as expected behavior.
                    unverified_premises:
                      type: array
                      items:
                        type: object
                        required: [premise, why_unverified]
                        additionalProperties: false
                        properties:
                          premise:        { type: string, minLength: 1 }
                          why_unverified: { type: string, minLength: 1 }
                    budget:
                      type: object
                      required: [max_pages, max_probes]
                      properties:
                        max_pages:  { type: integer, minimum: 1 }
                        max_probes: { type: integer, minimum: 1 }
            executor: { kind: noop }
            output:
              charter: "$.arguments.charter"
      done: { terminal: true }
