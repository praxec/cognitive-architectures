# capabilities/cap.coordinate.cpm-plan.yaml
#
# Coordination cap: submit a drafted task graph to the cpm-planner MCP
# server and receive the computed plan (critical path, slack,
# bottlenecks, cohort schedule). V6 maps the `coordinate` verb to a
# `kind: mcp` executor (the only verb whose primary executor is an MCP
# call — see cap.coordinate.pr-open). Operators wire the `cpm-planner`
# connection in their gateway config (reference: connections/cpm-planner.yaml).

workflows:
  cap.coordinate.cpm-plan:
    verb: coordinate
    lifecycle: experimental
    description: >
      Submit a task graph to cpm-planner; return the computed schedule
      (critical path, bottlenecks, parallel cohorts).
    snippet:
      inputs:
        graph: { type: object, required: true }
      outputs:
        plan_id:  { type: string }
        schedule: { type: object }
    initialState: ready
    states:
      ready:
        goal: Submit the task graph to the CPM planner; capture the plan_id.
        transitions:
          submit:
            target: scheduling
            actor: deterministic
            executor:
              kind: mcp
              connection: cpm-planner
              tool: plan.submit
              # McpExecutor resolves `map:` (NOT `arguments:`) against
              # $.arguments / $.context / $.workflow.input. The cap input
              # `graph` lives in workflow.input; bind the tool's `graph` param
              # from it (name harmonized with cap.plan.build-graph + the tool).
              map:
                graph: "$.workflow.input.graph"
            # `plan.submit` returns SubmitResponse { plan_id } and NOTHING else
            # (cpm-planner/src/server.rs) — the schedule lives behind `plan.status`.
            # Capture the id here; the `scheduling` state below fetches the schedule
            # this cap's description actually promises.
            output:
              plan_id: "$.output.plan_id"
      scheduling:
        goal: Read back the computed schedule (critical path, hours, deliverable rows).
        transitions:
          fetch_schedule:
            target: done
            actor: deterministic
            executor:
              kind: mcp
              connection: cpm-planner
              tool: plan.status
              map:
                plan_id: "$.context.plan_id"
            output:
              schedule: "$.output"
      done: { terminal: true }
