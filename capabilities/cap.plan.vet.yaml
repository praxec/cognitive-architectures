# capabilities/cap.plan.vet.yaml
#
# Adversarial review of a draft plan. Cognitive cap — agent reads
# the `plan.review.adversarial` skill (a REVIEW skill matching this cap's
# verdict+findings contract, PROPORTIONAL to plan risk), evaluates the input
# plan, submits verdict + findings. (Previously read `compose.plan.vet`, a
# plan-COMPOSER skill, which made the agent emit a plan and dump its critique
# into the `verdict` enum — a cap/skill contract mismatch.)

workflows:
  cap.plan.vet:
    verb: plan
    lifecycle: experimental
    description: >
      Adversarial review of a draft plan; emit verdict + findings.
    snippet:
      inputs:
        plan:           { type: object,  required: true }
        max_iterations: { type: integer, default: 3 }
      outputs:
        verdict:  { type: string, enum: [pass, fail, needs-revision] }
        findings: { type: array }
    skills: [plan.review.adversarial]
    initialState: ready
    states:
      ready:
        goal: >
          Review the plan adversarially and PROPORTIONALLY to its risk/blast-radius
          (a low-risk single-file or doc plan gets a light review; high-risk /
          schema / auth plans get full scrutiny). Emit `verdict` as EXACTLY one of
          pass | fail | needs-revision (a single token) and put ALL analysis in the
          `findings` array — never in `verdict`.
        transitions:
          submit_vet:
            target: done
            actor: agent
            inputSchema:
              type: object
              required: [verdict]
              properties:
                verdict:  { type: string, enum: [pass, fail, needs-revision] }
                findings: { type: array, default: [] }
            executor: { kind: noop }
            output:
              verdict:  "$.arguments.verdict"
              findings: "$.arguments.findings"
      done: { terminal: true }
