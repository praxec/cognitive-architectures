# capabilities/cap.implement.scope-bounded.yaml

workflows:
  cap.implement.scope-bounded:
    verb: implement
    lifecycle: experimental
    description: >
      Apply edits constrained to scope_paths, GROUNDED in the real cited
      symbols (never invented). Out-of-scope writes are refused by the
      underlying edit tool; an under-scoped deliverable is reported honestly,
      not papered over with a hallucinated API.
    snippet:
      inputs:
        plan:        { type: object, required: true }
        scope_paths: { type: array,  required: true }
      outputs:
        result: { type: object }
    skills: [implement.edit.constrained]
    initialState: ready
    states:
      ready:
        goal: >
          Apply edits constrained to scope_paths. GROUND every cited symbol in
          its real definition in this repo (read it first) — never invent a
          parallel API, and never emit a test that references an undefined
          symbol. If a faithful implementation needs a new shared type outside
          scope_paths, STOP and report "deliverable under-scoped: needs <symbol>
          in <file>" rather than fabricating a local stand-in. Any `mod tests`
          you add MUST be `#[cfg(test)]`-gated.
        transitions:
          submit_result:
            target: done
            actor: agent
            inputSchema:
              type: object
              required: [result]
              properties:
                result: { type: object }
            executor: { kind: noop }
            output:
              result: "$.arguments.result"
      done: { terminal: true }
