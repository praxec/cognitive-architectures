# capabilities/cap.verify.dotnet.yaml
#
# The `verify` specialization slot cap for `stack: dotnet` (Spec A ¬ß3.1). A
# `hop_slot: verify` transition in a `stack: dotnet` workflow resolves to THIS
# cap (`cap.verify.<stack>`), and the engine injects the canonical
# verifyIn/verifyOut contracts around it (praxec://hop). Mirrors cap.verify.rust:
# it binds to the `verify.dotnet.green` script (dotnet build + test) which emits
# the verifyOut shape on stdout, and sets `treatNonZeroAsFailure: false` so a
# `status: fail` verdict is CAPTURED as output (tri-state gate in the payload)
# rather than collapsing to a transition error.
#
# Without this cap, a `stack: dotnet` workflow's verify slot falls back to
# cap.verify.generic (honest `not_evaluated`) ‚Äî i.e. no real .NET gate. This cap
# is what makes praxec actually verify C#/.NET work.
#
# SCOPE (docs/plan-types.develop-vs-execute.md ‚Äî the velocity discipline):
# `scope` is OPTIONAL and defaults to "" (empty) ‚Äî the FULL `dotnet build` +
# `dotnet test` over `cwd`, UNCHANGED from before this cap gained the input
# (every existing caller that omits it keeps today's behavior exactly). When a
# caller passes `scope` (a project-relative path, e.g. a single `.csproj`/test
# project directory, OR a `dotnet test --filter` fragment), the underlying
# script narrows the build+test to that project/filter instead of the whole
# `cwd` tree ‚Äî the fast per-slice check. The whole-solution run stays the
# unscoped/barrier arm, meant to run ONCE at cohort/plan close ‚Äî see
# `flow.execute-cohorts`'s `barrier_verifying` state and
# `flow.cohort.compiled-stack`'s verify milestone. `cwd` itself already lets a
# caller narrow to a project directory (as `flow.implement.dotnet-slice`'s
# `scoped_cwd` does) ‚Äî `scope` is for narrowing FURTHER within a shared `cwd`
# via an explicit filter, without forcing every caller to also split cwd.
workflows:
  cap.verify.dotnet:
    verb: verify
    lifecycle: experimental
    description: >
      .NET correctness gate: dotnet build + dotnet test (Category!=IntegrationTest
      by default), emitted as the canonical HOP verifyOut
      (status/summary/criteria/findings/provenance). The verify slot cap for
      stack: dotnet. Optional `scope` (a project path or test filter fragment)
      narrows the per-slice check ‚Äî "" (default) runs the full barrier gate
      over `cwd` unchanged.
    snippet:
      # verifyIn requires `cwd`; the hop_slot resolver forwards it as the cap's
      # `cwd` input. OPTIONAL here so a deterministic slot call (no actor
      # arguments) degrades to PWD rather than failing the sub-workflow start.
      inputs:
        cwd:   { type: string }
        scope: { type: string, default: "" }
      # Convention (Spec A.1 ¬ß4.2): a cap.<slot>.<stack> names its HOP output
      # after the slot. The engine maps this into $.context.verify.
      outputs:
        verify: { $ref: "praxec://hop#/$defs/verifyOut" }
    initialState: ready
    states:
      ready:
        goal: >
          Run the .NET build+test gate; emit verifyOut. Full cwd-wide gate
          when scope is empty; scoped to the given project/filter otherwise.
        transitions:
          run:
            target: done
            actor: deterministic
            executor:
              kind: script
              subject: verify.dotnet.green
              # Capture a `status: fail` verifyOut instead of erroring the
              # transition ‚Äî the tri-state gate is expressed in the payload.
              treatNonZeroAsFailure: false
              args:
                - "$.workflow.input.cwd"
                - "$.workflow.input.scope"
            output:
              verify: "$.output.json"
      done: { terminal: true }
