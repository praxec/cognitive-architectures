# capabilities/cap.verify.ts.yaml
#
# The `verify` specialization slot cap for `stack: ts` (Spec A §3.1). A
# `hop_slot: verify` transition in a `stack: ts` workflow resolves to THIS cap
# (`cap.verify.<stack>`), and the engine injects the canonical
# verifyIn/verifyOut contracts around it (praxec://hop). Mirrors cap.verify.rust
# / cap.verify.dotnet: it binds to the `verify.ts.green` script (npm install/ci
# + tsc --noEmit + vite build) which emits the verifyOut shape on stdout, and
# sets `treatNonZeroAsFailure: false` so a `status: fail` verdict is CAPTURED as
# output (tri-state gate in the payload) rather than collapsing to a transition
# error.
#
# Without this cap, a `stack: ts` workflow's verify slot falls back to
# cap.verify.generic (honest `not_evaluated`) — i.e. no real TypeScript gate,
# and a frontend deliverable would (wrongly) be run through cargo. This cap is
# what makes praxec actually verify TypeScript/React/Vite work with its OWN
# toolchain.

workflows:
  cap.verify.ts:
    verb: verify
    lifecycle: experimental
    description: >
      TypeScript/Vite correctness gate: npm ci (or install) + tsc --noEmit +
      vite build, emitted as the canonical HOP verifyOut
      (status/summary/criteria/findings/provenance). The verify slot cap for
      stack: ts.
    snippet:
      # verifyIn requires `cwd`; the hop_slot resolver forwards it as the cap's
      # `cwd` input. OPTIONAL here so a deterministic slot call (no actor
      # arguments) degrades to PWD rather than failing the sub-workflow start.
      inputs:
        cwd: { type: string }
      # Convention (Spec A.1 §4.2): a cap.<slot>.<stack> names its HOP output
      # after the slot. The engine maps this into $.context.verify.
      outputs:
        verify: { $ref: "praxec://hop#/$defs/verifyOut" }
    initialState: ready
    states:
      ready:
        goal: Run the TypeScript/Vite build+typecheck gate; emit verifyOut.
        transitions:
          run:
            target: done
            actor: deterministic
            executor:
              kind: script
              subject: verify.ts.green
              # Capture a `status: fail` verifyOut instead of erroring the
              # transition — the tri-state gate is expressed in the payload.
              treatNonZeroAsFailure: false
              args:
                - "$.workflow.input.cwd"
            output:
              verify: "$.output.json"
      done: { terminal: true }
