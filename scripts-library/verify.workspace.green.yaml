version: "1.0.0"
scripts:
  verify.workspace.green:
    verb: verify
    lifecycle: stable
    source: cognitive-architectures
    body: |
      #!/usr/bin/env bash
      # Rust workspace correctness gate (cargo fmt + clippy + test), emitted as
      # the canonical HOP `verifyOut` shape (praxec://hop#/$defs/verifyOut):
      #   { status, summary, criteria[], findings[], provenance }
      # `status` = "pass" iff every criterion.met is true, else "fail". The exit
      # code mirrors status (0 = pass, 1 = fail) so exit-code consumers keep
      # their gate semantics (e.g. swe-agent's `$.output.success`); slot
      # consumers (cap.verify.rust via hop_slot) read the full verifyOut from
      # `$.output.json` (that cap sets `treatNonZeroAsFailure: false` so a
      # `status: fail` verdict is CAPTURED, not turned into a transition error).
      #
      # Optional positional $1 = working directory to verify (the verifyIn `cwd`
      # the slot forwards); defaults to the process PWD when absent.
      set -uo pipefail

      cwd="${1:-$PWD}"
      cd "$cwd" 2>/dev/null || true

      # Build one verifyOut `criterion` object; met is a JSON bool literal.
      crit() { printf '{"id":"%s","met":%s,"evidence":"%s"}' "$1" "$2" "$3"; }

      STATUS="pass"

      if cargo fmt --all -- --check >&2; then
        c_fmt=$(crit format true "cargo fmt --all -- --check clean")
      else
        c_fmt=$(crit format false "cargo fmt reported formatting violations"); STATUS="fail"
      fi

      if cargo clippy --workspace --all-targets -- -D warnings >&2; then
        c_lint=$(crit lint true "cargo clippy -D warnings clean")
      else
        c_lint=$(crit lint false "cargo clippy reported warnings/errors"); STATUS="fail"
      fi

      if cargo test --workspace >&2; then
        c_test=$(crit test true "cargo test --workspace green")
      else
        c_test=$(crit test false "cargo test --workspace failed"); STATUS="fail"
      fi

      printf '{"status":"%s","summary":"cargo fmt + clippy + test: %s","criteria":[%s,%s,%s],"findings":[],"provenance":{"stack":"language:rust","source":"pack"}}\n' \
        "$STATUS" "$STATUS" "$c_fmt" "$c_lint" "$c_test"

      [ "$STATUS" = "pass" ] && exit 0 || exit 1
