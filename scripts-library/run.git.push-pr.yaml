# scripts-library/run.git.push-pr.yaml
#
# Push the branch and ensure an open PR exists for it — IDEMPOTENT, so
# flow.check-in calls it both to open the PR and to re-push after a conflict
# resolution merge commit (the second call finds and reuses the existing PR).
# Uses the operator's own `gh` auth (check-in piggybacks on the operator's git
# credentials; praxec manages none of its own). Every failure is reported as
# DATA (exit 0) so a workflow gate can branch on it.
# Inputs — POSITIONAL ARGS:
#   $1 / BRANCH — the head branch to push (required)
#   $2 / BASE   — the PR base branch (required)
#   $3 / TITLE  — PR title (used only when creating)
#   $4 / BODY   — PR body  (used only when creating; "" ok)
# Run with the leaf `workingDirectory: $.run.repo_root`.
# Emits {ok, pushed, pr_url, pr_number, created, error} JSON on stdout.
version: "1.0.0"
scripts:
  run.git.push-pr:
    verb: run
    lifecycle: experimental
    source: cognitive-architectures
    body: |
      #!/usr/bin/env bash
      # No `set -e`: every failure is reported as JSON data, exit 0.
      set -uo pipefail
      [ -n "${WORKDIR:-}" ] && cd "$WORKDIR" 2>/dev/null
      jstr() { printf '%s' "${1:-}" | jq -Rs . 2>/dev/null || printf '""'; }
      emit() { printf '{"ok": %s, "pushed": %s, "pr_url": %s, "pr_number": %s, "created": %s, "error": %s}\n' \
                 "$1" "$2" "$3" "$4" "$5" "$6"; exit 0; }
      # pr_url is "" (never JSON null) on failure: flow.check-in declares it
      # `type: string`, and null under a scalar schema is NOT deterministically
      # repairable — it would fail the terminal output contract on every abort
      # path. The caller must still gate on `ok`, never on a non-empty pr_url.
      fail() { emit false false '""' null false "$(jstr "$1")"; }

      branch="${1:-${BRANCH:-}}"
      base="${2:-${BASE:-}}"
      title="${3:-${TITLE:-}}"
      body="${4:-${BODY:-}}"
      [ -z "${branch// /}" ] && fail "empty branch"
      [ -z "${base// /}" ]   && fail "empty base"

      git rev-parse --is-inside-work-tree >/dev/null 2>&1 || fail "not a git work tree"
      command -v gh >/dev/null 2>&1 || fail "gh CLI not on PATH"

      push_err="$(git push -u origin "$branch" 2>&1)" \
        || fail "git push failed: $(printf '%s' "$push_err" | tail -1)"

      # Reuse an existing open PR for this head branch (idempotent re-entry).
      existing="$(gh pr list --head "$branch" --state open --json url,number \
                    --jq '.[0] // empty' 2>/dev/null)"
      if [ -n "$existing" ]; then
        url="$(printf '%s' "$existing" | jq -r '.url')"
        num="$(printf '%s' "$existing" | jq -r '.number')"
        emit true true "$(jstr "$url")" "$num" false null
      fi

      [ -z "${title// /}" ] && title="praxec check-in: $branch"
      create_err="$(gh pr create --head "$branch" --base "$base" \
                      --title "$title" --body "$body" 2>&1)" \
        || fail "gh pr create failed: $(printf '%s' "$create_err" | tail -1)"

      created="$(gh pr list --head "$branch" --state open --json url,number \
                   --jq '.[0] // empty' 2>/dev/null)"
      [ -z "$created" ] && fail "PR created but not found via gh pr list"
      url="$(printf '%s' "$created" | jq -r '.url')"
      num="$(printf '%s' "$created" | jq -r '.number')"
      emit true true "$(jstr "$url")" "$num" true null
