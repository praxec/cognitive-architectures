version: "1.0.0"
scripts:
  verify.dotnet.green:
    verb: verify
    lifecycle: experimental
    source: cognitive-architectures
    body: |
      #!/usr/bin/env bash
      # .NET correctness gate (dotnet build + dotnet test), emitted as the
      # canonical HOP `verifyOut` shape (praxec://hop#/$defs/verifyOut):
      #   { status, summary, criteria[], findings[], provenance }
      # `status` = "pass" iff every criterion.met is true, else "fail". Exit code
      # mirrors status (0 = pass, 1 = fail); slot consumers (cap.verify.dotnet via
      # hop_slot, which sets treatNonZeroAsFailure:false) read the full verifyOut
      # from $.output.json.
      #
      # ACTIONABLE FAILURES (FB-5, 2026-07-15): on a FAILED build, this gate does
      # NOT collapse to a one-line summary. It PARSES the dotnet build/test output
      # for compiler diagnostics of the form
      #   File.cs(12,34): error CS0117: 'Assert' has no definition for 'Equal' [P.csproj]
      # and emits ONE structured `finding` per unique error
      #   { file, line, column, rule_id, severity, message }
      # AND folds the same error lines into `summary`. The implement leaf binds
      # `context.build_issues` from this verifyOut's `summary` (the flow's
      # scoped/backstop gate does `build_issues: $.context.<gate>_out.summary`), so
      # the fixing agent receives the CONCRETE compiler errors to fix — not the
      # useless "fail (mode: native)" one-liner that made the C# dogfood run repeat
      # the same mistake for 3 iterations. This is the LOG-DRIVEN-FIX pattern: the
      # gate surfaces the real diagnostics, not a verdict. The pass/fail verdict is
      # UNCHANGED (a genuine failure stays a failure); only the failure payload is
      # enriched.
      #
      # Test filter matches a common CI gate: everything EXCEPT integration tests
      # (`Category!=IntegrationTest`). Override with $DOTNET_TEST_FILTER.
      #
      # Optional positional $1 = working directory (a .sln or project dir); the
      # verifyIn `cwd` the slot forwards. Defaults to PWD.
      #
      # Optional positional $2 = SCOPE (cap.verify.dotnet's `scope` input) — the
      # per-slice narrowing target. Two forms, disambiguated by disk lookup
      # relative to $cwd:
      #   - a PROJECT PATH (a .csproj/.sln or a directory containing one): build
      #     + test THAT PROJECT ONLY instead of the whole cwd tree.
      #   - anything else: an ADDITIONAL `dotnet test --filter` fragment, ANDed
      #     with the base Category filter (still builds the whole cwd tree —
      #     dotnet has no "build only these files", so a filter-only scope
      #     narrows the TEST run, not the build).
      # Empty/absent (default): UNCHANGED full cwd-wide build+test — the
      # barrier gate this script has always been, meant to run ONCE at
      # cohort/plan close (docs/plan-types.develop-vs-execute.md), not per slice.
      #
      # PORTABILITY: uses `dotnet` when it is on PATH. If it is NOT (e.g. praxec
      # hosted under WSL where the SDK lives on the Windows side), it falls back
      # to `powershell.exe -Command "dotnet ..."`, translating a /mnt/<drive>
      # cwd to a Windows path. Set $DOTNET_CMD to force a specific invocation.
      #
      # SELF-SUFFICIENCY (hardened 2026-07-11): this script must not depend on
      # the invoking process's env. A long-lived `praxec serve` daemon may have
      # been started before a native SDK was installed, or from a shell that
      # never exported the toolchain PATH / hook-skip var — so the gate resolves
      # its own environment instead of trusting the caller's:
      #   1. Prepend $HOME/.dotnet and $HOME/.powershell to PATH so a native
      #      SDK/pwsh install is always preferred over the powershell.exe/WSL
      #      interop fallback (interop can be down independent of the SDK).
      #   2. Default SKIP_GIT_HOOKS_VERIFY=1 (only if the caller hasn't set it)
      #      so repos whose pre-build target shells out to a hook-verify script
      #      with CRLF line endings on a /mnt/<drive> checkout (dash chokes on
      #      CRLF) don't fail the build for a reason unrelated to the code
      #      under test. Caller can still force it off with
      #      SKIP_GIT_HOOKS_VERIFY=0 (or any non-"1" value) if a repo's hooks
      #      legitimately need to run as part of the gate.
      #   3. Default SKIP_PROJECT_SCHEMA_GENERATION=1 (only if unset). Some
      #      repos MSBuild-invoke a Windows-npm `quicktype` shim via WSL
      #      interop as a pre-build step (JSON-schema -> POCO codegen); that
      #      shim can hang indefinitely when interop is degraded, which would
      #      hang this "deterministic" gate — unacceptable. The repos that do
      #      this already ship a designed bypass (same one they use for
      #      Docker/Podman images, which also lack npm/quicktype) that falls
      #      back to committed Generated.cs, so build+test still exercises
      #      real generated code — just not freshly regenerated. Repos without
      #      this env var simply ignore it.
      set -uo pipefail

      export PATH="$HOME/.dotnet:$HOME/.powershell:${PATH:-}"
      export SKIP_GIT_HOOKS_VERIFY="${SKIP_GIT_HOOKS_VERIFY:-1}"
      export SKIP_PROJECT_SCHEMA_GENERATION="${SKIP_PROJECT_SCHEMA_GENERATION:-1}"
      export DOTNET_NOLOGO="${DOTNET_NOLOGO:-1}"
      export DOTNET_CLI_TELEMETRY_OPTOUT="${DOTNET_CLI_TELEMETRY_OPTOUT:-1}"

      cwd="${1:-$PWD}"
      scope="${2:-}"
      test_filter="${DOTNET_TEST_FILTER:-Category!=IntegrationTest}"

      # Resolve SCOPE's two forms (see header). build_target is what `dn build`
      # / `dn test` operate on ("" = whole cwd, unchanged); scope_filter is an
      # extra --filter fragment ANDed onto test_filter (empty = none added).
      build_target=""
      scope_filter=""
      if [ -n "${scope// /}" ]; then
        if [ -e "$cwd/$scope" ] || [ -e "$scope" ]; then
          build_target="$scope"
        else
          scope_filter="$scope"
        fi
      fi
      if [ -n "$scope_filter" ]; then
        test_filter="(${test_filter})&(${scope_filter})"
      fi

      # JSON-string-safe body for stdin (no surrounding quotes): escape backslash
      # and doublequote; collapse embedded newlines to a literal \n so a multi-line
      # value (e.g. the enriched summary) stays a single valid JSON string.
      json_escape() {
        sed -e 's/\\/\\\\/g' -e 's/"/\\"/g' \
          | awk 'BEGIN{ORS=""} NR>1{printf "\\n"} {printf "%s", $0}'
      }

      # Resolve how to invoke the SDK. dn <args...> runs `dotnet <args...>` in $cwd.
      if [ -n "${DOTNET_CMD:-}" ]; then
        dn() { ( cd "$cwd" 2>/dev/null; $DOTNET_CMD "$@" ); }
        mode="explicit:$DOTNET_CMD"
      elif command -v dotnet >/dev/null 2>&1; then
        dn() { ( cd "$cwd" 2>/dev/null; dotnet "$@" ); }
        mode="native"
      elif command -v powershell.exe >/dev/null 2>&1; then
        # /mnt/c/foo/bar -> C:\foo\bar   (best-effort; falls through for UNC/other)
        winpath=$(printf '%s' "$cwd" | sed -E 's|^/mnt/([a-z])/|\U\1:/|; s|/|\\|g')
        dn() { powershell.exe -NoProfile -Command "cd '$winpath'; dotnet $*" 2>&1; }
        mode="wsl:powershell.exe"
      else
        printf '{"status":"not_evaluated","summary":"no dotnet SDK found (native, $DOTNET_CMD, or powershell.exe); dotnet unavailable in this environment","criteria":[],"findings":[],"provenance":{"stack":"language:dotnet","source":"pack"}}\n'
        exit 1
      fi

      crit() { printf '{"id":"%s","met":%s,"evidence":"%s"}' "$1" "$2" "$3"; }
      STATUS="pass"

      # Capture build/test output so we can BOTH stream it to stderr (logs) AND
      # parse compiler diagnostics out of it for the failure payload.
      build_out=""
      test_out=""

      if [ -n "$build_target" ]; then
        build_out=$(dn build --nologo "$build_target" 2>&1); build_rc=$?
      else
        build_out=$(dn build --nologo 2>&1); build_rc=$?
      fi
      if [ "$build_rc" -eq 0 ]; then
        printf '%s\n' "$build_out" >&2
        c_build=$(crit build true "dotnet build succeeded${build_target:+ ($build_target)}")
      else
        printf '%s\n' "$build_out" >&2
        c_build=$(crit build false "dotnet build failed${build_target:+ ($build_target)}"); STATUS="fail"
      fi

      # Only run tests if build passed (a failed build makes test output noise).
      if [ "$STATUS" = "pass" ]; then
        if [ -n "$build_target" ]; then
          test_out=$(dn test --nologo --filter "$test_filter" "$build_target" 2>&1); test_rc=$?
        else
          test_out=$(dn test --nologo --filter "$test_filter" 2>&1); test_rc=$?
        fi
        if [ "$test_rc" -eq 0 ]; then
          printf '%s\n' "$test_out" >&2
          c_test=$(crit test true "dotnet test (filter: $test_filter)${build_target:+ ($build_target)} green")
        else
          printf '%s\n' "$test_out" >&2
          c_test=$(crit test false "dotnet test (filter: $test_filter)${build_target:+ ($build_target)} failed"); STATUS="fail"
        fi
      else
        c_test=$(crit test false "skipped: build failed")
      fi

      # ── PARSE compiler diagnostics from the combined build+test output ──
      # A dotnet/MSBuild error line is:
      #   <file>(<line>,<col>): error <CODE>: <message> [<project>]
      # (the column and the trailing [project] are optional). We surface ERROR
      # severities only — those are the fix-driving diagnostics; warnings are noise
      # for a red->green fix loop. Duplicate lines (dotnet re-emits per TFM/project)
      # are de-duped so the agent sees each error once.
      all_output=$(printf '%s\n%s\n' "$build_out" "$test_out" | tr -d '\r')
      mapfile -t diag_lines < <(printf '%s\n' "$all_output" \
        | grep -E '\([0-9]+(,[0-9]+)?\): error [A-Za-z][A-Za-z0-9]+: ' \
        | awk '!seen[$0]++')

      re_col='^(.+)\(([0-9]+),([0-9]+)\): error ([A-Za-z][A-Za-z0-9]+): (.+)$'
      re_nocol='^(.+)\(([0-9]+)\): error ([A-Za-z][A-Za-z0-9]+): (.+)$'
      findings_items=()
      diag_text=""
      diag_count=0
      for line in "${diag_lines[@]}"; do
        if [[ "$line" =~ $re_col ]]; then
          efile=$(printf '%s' "${BASH_REMATCH[1]}" | json_escape)
          ln="${BASH_REMATCH[2]}"; col_json=",\"column\":${BASH_REMATCH[3]}"
          code="${BASH_REMATCH[4]}"
          emsg=$(printf '%s' "${BASH_REMATCH[5]}" | json_escape)
        elif [[ "$line" =~ $re_nocol ]]; then
          efile=$(printf '%s' "${BASH_REMATCH[1]}" | json_escape)
          ln="${BASH_REMATCH[2]}"; col_json=""
          code="${BASH_REMATCH[3]}"
          emsg=$(printf '%s' "${BASH_REMATCH[4]}" | json_escape)
        else
          continue
        fi
        findings_items+=("{\"file\":\"$efile\",\"line\":$ln$col_json,\"rule_id\":\"$code\",\"severity\":\"error\",\"message\":\"$emsg\"}")
        diag_text="${diag_text}- ${line}"$'\n'
        diag_count=$((diag_count + 1))
      done

      if [ "${#findings_items[@]}" -gt 0 ]; then
        findings_json="[$(IFS=,; echo "${findings_items[*]}")]"
      else
        findings_json="[]"
      fi

      # ── SUMMARY ── on pass, the terse verdict; on fail, the verdict PLUS the
      # concrete per-error lines so `context.build_issues` (bound to summary) is
      # actionable. `mode` still rides in summary (NOT provenance): provenance is a
      # CLOSED {stack, source} $def, and an extra key fails cap.output.schema_violation
      # and would discard an otherwise-correct verdict.
      if [ "$STATUS" = "pass" ]; then
        summary="dotnet build + test: pass (mode: $mode)"
      elif [ "$diag_count" -gt 0 ]; then
        summary="dotnet build + test: fail (mode: $mode) — ${diag_count} compiler error(s), fix EVERY one:"$'\n'"${diag_text%$'\n'}"
      else
        # Genuine failure with no parseable compiler diagnostic (e.g. a test
        # assertion failure, or a build error in a form we don't parse). Keep the
        # verdict; the streamed stderr log carries the detail.
        summary="dotnet build + test: fail (mode: $mode) — see build/test log for detail (no compiler diagnostics parsed)"
      fi
      esummary=$(printf '%s' "$summary" | json_escape)

      printf '{"status":"%s","summary":"%s","criteria":[%s,%s],"findings":%s,"provenance":{"stack":"language:dotnet","source":"pack"}}\n' \
        "$STATUS" "$esummary" "$c_build" "$c_test" "$findings_json"

      [ "$STATUS" = "pass" ] && exit 0 || exit 1
