# scripts-library/audit.completeness.discover.yaml
#
# DETERMINISTIC discovery half of flow.audit.completeness: orchestrate pinned
# off-the-shelf analyzers (ripgrep; knip / madge / jscpd via pinned npx) into
# one reproducible candidate list — {file, line, VERBATIM quote} per candidate,
# per category (STUB/ORPHAN/DEAD/DRY/SPLIT/INTERFACE_GAP) and per language
# (cs/ts). Over-surfaces by design (recall); the flow's agent validation gate
# is the precision filter. Extensible per category/language via the config's
# extra_rg_detectors / disabled_detectors WITHOUT touching the LLM contract.
# Determinism: pinned tool versions recorded in the summary, sorted output,
# hash-seeded sampling, no wall-clock in any candidate; analyzer failures are
# data (skipped[] with reason), exit 0.
version: "1.0.0"
scripts:
  audit.completeness.discover:
    verb: audit
    lifecycle: experimental
    source: cognitive-architectures
    body: |
      #!/usr/bin/env python3
      # audit.completeness.discover — deterministic, high-recall completeness-candidate
      # discovery. Off-the-shelf analyzers (ripgrep, knip, madge, jscpd) orchestrated
      # behind one reproducible entry point; NO LLM judgment here. Over-surfacing is
      # intentional (recall over precision) — the downstream validation gate is the
      # precision filter. Determinism: pinned tool versions, sorted output, no
      # wall-clock or randomness in any candidate; sampling is hash-seeded.
      #
      # argv: $1 repo_path  $2 config_path (JSON; {} allowed)  $3 out_dir
      # stdout: JSON summary {schema, repo, git_sha, tool_versions, counts, sampling,
      #         skipped[], overflow{}, candidates_path}. Candidate list (with a
      #         VERBATIM quote per candidate) is written to <out_dir>/candidates.json.
      # Every failure is data (skipped[] with a reason), exit 0 — verdicts are data.
      import collections
      import hashlib
      import json
      import os
      import re
      import subprocess
      import sys

      GENERATED_MARKERS = ("auto-generated", "autogenerated", "@generated", "do not edit", "code generated")


      def resolve_rg():
          """RG_BIN env → PATH rg → the @vscode/ripgrep binary staged at
          ~/.local/bin/rg-praxec (installed via `npm i @vscode/ripgrep` when the
          host has no system ripgrep — e.g. rg exists only as an interactive
          shell function)."""
          import shutil
          for cand in (os.environ.get("RG_BIN"), shutil.which("rg"),
                       os.path.expanduser("~/.local/bin/rg-praxec")):
              if cand and os.path.isfile(cand) and os.access(cand, os.X_OK):
                  return cand
          return "rg"  # last resort; failures surface as skipped[] entries


      RG = resolve_rg()

      DEFAULTS = {
          "langs": ["cs", "ts"],
          # rg -g '!' exclusion globs (generic + overridable). Content-marked
          # generated files are ALSO excluded by the marker check below.
          "exclude_globs": [
              "**/node_modules/**", "**/bin/**", "**/obj/**", "**/dist/**", "**/build/**",
              "**/coverage/**", "**/target/**", "**/__pycache__/**", "**/.next/**",
              "**/*.min.js", "**/*.bundle.js", "**/*.d.ts", "**/*.generated.*",
              "**/*.g.cs", "**/*.designer.cs", "**/*.pb.*", "**/*.lock",
          ],
          "priority_modules": [],
          "sample_percent": 20,
          "seed_salt": "completeness-audit-v1",
          "max_per_detector": 4000,
          # TS project dir (repo-relative) for knip/madge; empty disables both.
          "ts_project": "",
          "ts_src": "src",
          "jscpd_targets": [],           # repo-relative dirs; empty disables jscpd
          "jscpd_min_tokens": 100,
          "disabled_detectors": [],
          "extra_rg_detectors": [],      # [{id, category, language, pattern, globs:[], flags:[]}]
          "tool_pins": {"knip": "6.27.0", "jscpd": "5.0.12", "madge": "8.0.0"},
          "npx_timeout_sec": 900,
      }

      # ── detector registry (rg-backed; the extensible half). Category ∈
      #    STUB|ORPHAN|DEAD|DRY|SPLIT|INTERFACE_GAP, mirroring the LLM contract.
      RG_DETECTORS = [
          {"id": "stub_markers_cs",    "category": "STUB", "language": "cs",
           "pattern": r"//.*\b(TODO|FIXME|HACK|XXX)\b|NOT ?IMPLEMENTED|\bWIP\b", "globs": ["*.cs"]},
          {"id": "stub_markers_ts",    "category": "STUB", "language": "ts",
           "pattern": r"//.*\b(TODO|FIXME|HACK|XXX)\b|NOT ?IMPLEMENTED", "globs": ["*.ts", "*.tsx"]},
          {"id": "stub_throw_cs",      "category": "STUB", "language": "cs",
           "pattern": r"NotImplementedException", "globs": ["*.cs"]},
          {"id": "stub_501_cs",        "category": "STUB", "language": "cs",
           "pattern": r"Status501NotImplemented", "globs": ["*.cs"]},
          {"id": "stub_throw_ts",      "category": "STUB", "language": "ts", "flags": ["-i"],
           "pattern": r"throw new Error\(['\"](not.?implemented|todo|unimplemented)", "globs": ["*.ts", "*.tsx"]},
          {"id": "stub_return_marked", "category": "STUB", "language": "any", "flags": ["-i"],
           "pattern": r"return (null|undefined|Task\.CompletedTask|\[\]|\{\});?\s*//\s*(stub|todo|for now|temp|placeholder)",
           "globs": ["*.cs", "*.ts", "*.tsx"]},
          {"id": "swallowed_catch",    "category": "STUB", "language": "any", "flags": ["-U"],
           "pattern": r"catch\s*(\([^)]*\))?\s*\{\s*\}", "globs": ["*.cs", "*.ts", "*.tsx"]},
          {"id": "empty_body_cs",      "category": "STUB", "language": "cs", "flags": ["-U"],
           "pattern": r"(public|internal|protected)[^;{=()]*\([^)]*\)\s*\n\s*\{\s*\n\s*\}", "globs": ["*.cs"]},
          {"id": "dead_flag_false",    "category": "DEAD", "language": "any",
           "pattern": r"if\s*\(\s*false\s*\)|&&\s+false\b", "globs": ["*.cs", "*.ts", "*.tsx"]},
          {"id": "dead_disabled_flag", "category": "DEAD", "language": "any", "flags": ["-i"],
           "pattern": r"(enabled|feature|flag)\w*\s*[:=]\s*false\s*[,;]?\s*//", "globs": ["*.cs", "*.ts", "*.tsx"]},
      ]


      def sh(args, cwd=None, timeout=900):
          try:
              p = subprocess.run(args, cwd=cwd, capture_output=True, text=True,
                                 timeout=timeout, errors="replace")
              return p.returncode, p.stdout or "", p.stderr or ""
          except FileNotFoundError as e:
              return 127, "", str(e)
          except subprocess.TimeoutExpired:
              return 124, "", "timeout after %ss" % timeout


      class Discovery:
          def __init__(self, repo, cfg, out_dir):
              self.repo, self.cfg, self.out_dir = repo, cfg, out_dir
              self.candidates = []
              self.skipped = []
              self.overflow = collections.Counter()
              self.per_detector = collections.Counter()
              self._gen_cache = {}
              self._file_cache = {}

          # content-marked generated file? (first 12 lines)
          def is_generated(self, relpath):
              if relpath in self._gen_cache:
                  return self._gen_cache[relpath]
              verdict = False
              try:
                  with open(os.path.join(self.repo, relpath), "r", errors="replace") as f:
                      head = "".join(f.readline() for _ in range(12)).lower()
                  verdict = any(m in head for m in GENERATED_MARKERS)
              except OSError:
                  pass
              self._gen_cache[relpath] = verdict
              return verdict

          def file_lines(self, relpath):
              if relpath not in self._file_cache:
                  try:
                      with open(os.path.join(self.repo, relpath), "r", errors="replace") as f:
                          self._file_cache[relpath] = f.read().replace("\r\n", "\n").split("\n")
                  except OSError:
                      self._file_cache[relpath] = []
              return self._file_cache[relpath]

          def add(self, det, category, lang, relpath, line, quote, extra=None, skip_generated=True):
              relpath = relpath.replace("\\", "/").lstrip("./")
              if skip_generated and self.is_generated(relpath):
                  return
              if self.per_detector[det] >= self.cfg["max_per_detector"]:
                  self.overflow[det] += 1
                  return
              self.per_detector[det] += 1
              self.candidates.append({
                  "id": "",  # assigned after global sort
                  "detector": det, "category": category, "language": lang,
                  "file": relpath, "line": line, "quote": quote.rstrip(),
                  "extra": extra or {},
              })

          def rg_base(self, globset=None):
              args = [RG, "--no-heading", "--sort", "path", "--no-messages"]
              for g in (globset if globset is not None else self.cfg["exclude_globs"]):
                  args += ["-g", "!" + g]
              return args

          def run_rg_detector(self, det):
              args = self.rg_base() + ["-n"] + det.get("flags", []) + ["-e", det["pattern"]]
              for g in det.get("globs", []):
                  args += ["-g", g]
              rc, out, err = sh(args + ["."], cwd=self.repo)
              if rc not in (0, 1):  # 1 = no matches (fine)
                  self.skipped.append({"detector": det["id"], "reason": "rg rc=%s %s" % (rc, err[:200])})
                  return
              for ln in out.splitlines():
                  m = re.match(r"^(.*?):(\d+):(.*)$", ln)
                  if m:
                      self.add(det["id"], det["category"], det["language"], m.group(1),
                               int(m.group(2)), m.group(3))

          # ── C# structural detectors (one decl pass + one token pass, joined here) ──
          def cs_structural(self):
              decl_re = (r"^\s*(?:public|internal|protected|private)?\s*"
                         r"(?:sealed\s+|abstract\s+|static\s+|partial\s+|new\s+)*"
                         r"(?:class|interface|record|struct|enum)\s+[A-Z][A-Za-z0-9_]*")
              rc, out, _ = sh(self.rg_base() + ["-n", "-e", decl_re, "-g", "*.cs", "."], cwd=self.repo)
              if rc not in (0, 1):
                  self.skipped.append({"detector": "cs_structural", "reason": "decl rg rc=%s" % rc})
                  return
              decls = []  # (name, file, line, text, is_partial, is_abstract, kind)
              name_re = re.compile(r"(class|interface|record|struct|enum)\s+([A-Z][A-Za-z0-9_]*)")
              for ln in out.splitlines():
                  m = re.match(r"^(.*?):(\d+):(.*)$", ln)
                  if not m:
                      continue
                  nm = name_re.search(m.group(3))
                  if not nm:
                      continue
                  decls.append((nm.group(2), m.group(1).replace("\\", "/").lstrip("./"),
                                int(m.group(2)), m.group(3),
                                "partial " in m.group(3), "abstract " in m.group(3), nm.group(1)))
              # token pass: every PascalCase token occurrence in .cs + .csproj
              rc, out, err = sh(self.rg_base() + ["-o", "--no-filename", "-e",
                                r"\b[A-Z][A-Za-z0-9_]{2,}\b", "-g", "*.cs", "-g", "*.csproj", "."],
                                cwd=self.repo, timeout=1200)
              if rc not in (0, 1):
                  self.skipped.append({"detector": "cs_orphan_type", "reason": "token rg rc=%s %s" % (rc, err[:120])})
                  return
              counts = collections.Counter(out.split())
              partial_groups = collections.defaultdict(list)
              for name, f, line, text, is_partial, is_abstract, kind in sorted(decls):
                  generated = self.is_generated(f)
                  if is_partial:
                      partial_groups[name].append((f, line, text))
                  # xUnit/NUnit test classes are framework-instantiated (never
                  # referenced by name) — a definitional false positive; skip.
                  is_test = "/Tests/" in ("/" + f) or ".Tests/" in f or f.endswith("Tests.cs")
                  if not generated and not is_test and name not in ("Program", "Startup") \
                          and counts.get(name, 0) <= 1:
                      self.add("cs_orphan_type", "ORPHAN", "cs", f, line, text,
                               {"occurrences": counts.get(name, 0), "kind": kind})
              # INTERFACE_GAP: abstract classes with NO concrete subclass anywhere.
              # Uses GENERIC excludes only (DEFAULTS), so generated abstract decls
              # (e.g. OpenAPI abstract controllers in *.Contracts) stay ELIGIBLE —
              # the finding is the MISSING non-generated subclass, and the decl is
              # merely the citation. Inheritance set from the same generic scope.
              generic = DEFAULTS["exclude_globs"]
              rc3, out3, _ = sh(self.rg_base(generic) + ["-n", "-e",
                                r"^\s*(?:public|internal)?\s*abstract\s+(?:partial\s+)?class\s+[A-Z][A-Za-z0-9_]*",
                                "-g", "*.cs", "."], cwd=self.repo)
              rc2, out2, _ = sh(self.rg_base(generic) + ["-o", "-I", "-e",
                                r":\s*[A-Z][A-Za-z0-9_<>,.\s]*", "-g", "*.cs", "."], cwd=self.repo)
              inherited = set()
              if rc2 in (0, 1):
                  for frag in out2.splitlines():
                      inherited.update(re.findall(r"[A-Z][A-Za-z0-9_]{2,}", frag))
              if rc3 in (0, 1):
                  abs_name_re = re.compile(r"class\s+([A-Z][A-Za-z0-9_]*)")
                  for ln in sorted(out3.splitlines()):
                      m = re.match(r"^(.*?):(\d+):(.*)$", ln)
                      if not m:
                          continue
                      nm = abs_name_re.search(m.group(3))
                      if nm and nm.group(1) not in inherited:
                          f = m.group(1).replace("\\", "/").lstrip("./")
                          self.add("cs_abstract_unsubclassed", "INTERFACE_GAP", "cs", f,
                                   int(m.group(2)), m.group(3),
                                   {"generated_decl": self.is_generated(f)}, skip_generated=False)
              for name, sites in sorted(partial_groups.items()):
                  files = sorted({s[0] for s in sites})
                  if len(files) > 1 and not all(self.is_generated(f) for f in files):
                      f, line, text = sites[0]
                      self.add("cs_partial_split", "SPLIT", "cs", f, line, text,
                               {"files": files}, skip_generated=False)

          # ── TS project analyzers (pinned via npx) ──
          def npx(self, package, args, cwd, det):
              pin = self.cfg["tool_pins"].get(package, "latest")
              rc, out, err = sh(["npx", "-y", "%s@%s" % (package, pin)] + args, cwd=cwd,
                                timeout=self.cfg["npx_timeout_sec"])
              if rc == 127 or rc == 124:
                  self.skipped.append({"detector": det, "reason": "%s@%s: %s" % (package, pin, err[:200])})
                  return None
              return out

          def ts_knip(self):
              proj = self.cfg.get("ts_project")
              if not proj:
                  self.skipped.append({"detector": "ts_knip", "reason": "no ts_project configured"})
                  return
              cwd = os.path.join(self.repo, proj)
              out = self.npx("knip", ["--no-config-hints", "--reporter", "json",
                                      "--no-exit-code"], cwd, "ts_knip")
              if out is None:
                  return
              try:
                  data, _ = json.JSONDecoder().raw_decode(out, out.index("{"))
              except (ValueError, IndexError):
                  self.skipped.append({"detector": "ts_knip", "reason": "unparseable knip output: %s" % out[:200]})
                  return
              for f in sorted(data.get("files", [])):
                  rel = os.path.join(proj, f).replace("\\", "/")
                  lines = self.file_lines(rel)
                  quote = next((l for l in lines if l.strip()), "")
                  self.add("ts_unused_file", "ORPHAN", "ts", rel, 1, quote)
              for issue in sorted(data.get("issues", []), key=lambda i: i.get("file", "")):
                  rel = os.path.join(proj, issue.get("file", "")).replace("\\", "/")
                  for kind in ("exports", "types"):
                      for exp in issue.get(kind, []):
                          if isinstance(exp, dict):
                              line = int(exp.get("line", 1) or 1)
                              name = exp.get("name", "?")
                          else:
                              line, name = 1, str(exp)
                          lines = self.file_lines(rel)
                          quote = lines[line - 1] if 0 < line <= len(lines) else name
                          self.add("ts_unused_export", "ORPHAN", "ts", rel, line, quote,
                                   {"symbol": name, "issue_kind": kind})

          def ts_madge_orphans(self):
              proj = self.cfg.get("ts_project")
              if not proj:
                  self.skipped.append({"detector": "ts_madge", "reason": "no ts_project configured"})
                  return
              cwd = os.path.join(self.repo, proj)
              out = self.npx("madge", ["--orphans", "--json", "--extensions", "ts,tsx",
                                       "--ts-config", "tsconfig.json", self.cfg.get("ts_src", "src")],
                             cwd, "ts_madge")
              if out is None:
                  return
              try:
                  orphans, _ = json.JSONDecoder().raw_decode(out, out.index("["))
              except (ValueError, IndexError):
                  self.skipped.append({"detector": "ts_madge", "reason": "unparseable madge output: %s" % out[:200]})
                  return
              for f in sorted(orphans):
                  rel = os.path.join(proj, self.cfg.get("ts_src", "src"), f).replace("\\", "/")
                  lines = self.file_lines(rel)
                  quote = next((l for l in lines if l.strip()), "")
                  self.add("ts_orphan_module", "ORPHAN", "ts", rel, 1, quote)

          def dup_jscpd(self):
              targets = self.cfg.get("jscpd_targets") or []
              if not targets:
                  self.skipped.append({"detector": "dup_jscpd", "reason": "no jscpd_targets configured"})
                  return
              report_dir = os.path.join(self.out_dir, "jscpd")
              ignore = ",".join(self.cfg["exclude_globs"])
              out = self.npx("jscpd", ["--min-tokens", str(self.cfg["jscpd_min_tokens"]),
                                       "--reporters", "json", "--output", report_dir,
                                       "--ignore", ignore, "--silent"] + targets,
                             self.repo, "dup_jscpd")
              if out is None:
                  return
              path = os.path.join(report_dir, "jscpd-report.json")
              if not os.path.exists(path):
                  self.skipped.append({"detector": "dup_jscpd", "reason": "no jscpd-report.json produced"})
                  return
              with open(path) as f:
                  report = json.load(f)
              dups = sorted(report.get("duplicates", []),
                            key=lambda d: (d.get("firstFile", {}).get("name", ""),
                                           d.get("firstFile", {}).get("start", 0)))
              for d in dups:
                  a, b = d.get("firstFile", {}), d.get("secondFile", {})
                  rel = a.get("name", "").replace("\\", "/").lstrip("./")
                  start = int(a.get("start", 1) or 1)
                  lines = self.file_lines(rel)
                  quote = "\n".join(lines[start - 1:start + 2])
                  lang = "cs" if rel.endswith(".cs") else "ts"
                  self.add("dup_jscpd", "DRY", lang, rel, start, quote,
                           {"second_file": b.get("name", "").replace("\\", "/").lstrip("./"),
                            "second_start": b.get("start"), "lines": d.get("lines"),
                            "tokens": d.get("tokens")})

          # ── deterministic sampling: bucket per candidate; priority full,
          #    the rest hash-selected at sample_percent ──
          def bucket(self, relpath):
              parts = relpath.split("/")
              depth = 5 if relpath.startswith("PresentationTier/ui.autopilot/src/") else 3
              return "/".join(parts[:depth])

          def apply_sampling(self):
              prio = tuple(self.cfg["priority_modules"])
              pct, salt = self.cfg["sample_percent"], self.cfg["seed_salt"]
              buckets = {}
              for c in self.candidates:
                  b = self.bucket(c["file"])
                  if b not in buckets:
                      if any(b == p or b.startswith(p + "/") or p.startswith(b + "/") for p in prio):
                          buckets[b] = ("priority", True)
                      else:
                          h = int(hashlib.sha256((salt + b).encode()).hexdigest(), 16) % 100
                          buckets[b] = ("sampled" if h < pct else "dropped", h < pct)
                  c["in_scope"] = buckets[b][1]
                  c["scope_bucket"] = b
              return buckets


      def main():
          repo = os.path.abspath(sys.argv[1])
          cfg_path = sys.argv[2]
          out_dir = os.path.abspath(sys.argv[3])
          cfg = dict(DEFAULTS)
          cfg_digest = None
          if cfg_path and os.path.exists(cfg_path):
              raw = open(cfg_path, "rb").read()
              cfg_digest = hashlib.sha256(raw).hexdigest()
              user = json.loads(raw.decode())
              for k, v in user.items():
                  if k == "exclude_globs":
                      cfg[k] = sorted(set(DEFAULTS["exclude_globs"]) | set(v))
                  else:
                      cfg[k] = v
          os.makedirs(out_dir, exist_ok=True)
          d = Discovery(repo, cfg, out_dir)

          disabled = set(cfg["disabled_detectors"])
          for det in RG_DETECTORS + list(cfg.get("extra_rg_detectors", [])):
              if det["id"] in disabled:
                  continue
              if det["language"] != "any" and det["language"] not in cfg["langs"]:
                  continue
              d.run_rg_detector(det)
          if "cs" in cfg["langs"] and "cs_structural" not in disabled:
              d.cs_structural()
          if "ts" in cfg["langs"]:
              if "ts_knip" not in disabled:
                  d.ts_knip()
              if "ts_madge" not in disabled:
                  d.ts_madge_orphans()
          if "dup_jscpd" not in disabled:
              d.dup_jscpd()

          buckets = d.apply_sampling()
          d.candidates.sort(key=lambda c: (c["detector"], c["file"], c["line"]))
          for i, c in enumerate(d.candidates):
              c["id"] = "%s-%04d" % (c["category"], i + 1)

          with open(os.path.join(out_dir, "candidates.json"), "w") as f:
              json.dump(d.candidates, f, indent=1)

          _, sha, _ = sh(["git", "-C", repo, "rev-parse", "HEAD"])
          _, rgv, _ = sh([RG, "--version"])
          by_cat = collections.Counter(c["category"] for c in d.candidates)
          in_scope = sum(1 for c in d.candidates if c["in_scope"])
          summary = {
              "schema": "completeness-audit/candidates-summary/v1",
              "repo": repo,
              "git_sha": sha.strip(),
              "config_digest": cfg_digest,
              "tool_versions": {"rg": rgv.splitlines()[0] if rgv else "?",
                                "python": sys.version.split()[0],
                                "pins": cfg["tool_pins"]},
              "counts": {"total": len(d.candidates), "in_scope": in_scope,
                         "by_category": dict(sorted(by_cat.items())),
                         "by_detector": dict(sorted(d.per_detector.items()))},
              "sampling": {"priority_modules": cfg["priority_modules"],
                           "sample_percent": cfg["sample_percent"],
                           "buckets": {b: s for b, (s, _) in sorted(buckets.items())}},
              "skipped": d.skipped,
              "overflow": dict(sorted(d.overflow.items())),
              "candidates_path": os.path.join(out_dir, "candidates.json"),
          }
          print(json.dumps(summary))


      if __name__ == "__main__":
          main()

