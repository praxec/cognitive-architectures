# orchestrators/flow.qa.explore.yaml
#
# Agentic E2E browser-testing DISCOVERY loop (M1 vertical slice):
#
#   chartering  → cap.plan.test-charter: mission → bounded, citable charter
#                 (in/out of scope, invariants with sources, budget).
#   surveying   → cap.research.ui-surface: leased-browser delegate maps the
#                 app's surfaces (pages/elements/edges) inside the charter,
#                 and declares a closed-enum auth_state.
#   auth_gate   → a survey that never got past a login wall mapped nothing;
#                 probing it would return zero observations and render as a
#                 clean report. Aborts loudly instead.
#   probing     → cap.diagnose.browser-probe: leased-browser delegate hunts
#                 invariant violations and MINTS each observation as a
#                 machine-replayable Playwright spec (probe_ref) under
#                 `.praxec/qa-artifacts/` (repo-root-relative).
#   probe_gate  → nothing observed short-circuits straight to aggregation
#                 (an honest empty report), else collect evidence.
#   evidencing  → cap.diagnose.browser-evidence: transport-only opaque refs
#                 (console/network/screenshot/trace) per observation.
#   verifying   → cap.verify.repro-rate: THE deterministic reproduction
#                 gate — `playwright test --repeat-each=N --workers=1
#                 --reporter=json` per probe; successfulAttempts computed
#                 IN CODE; partition reproduced (>=2) / discarded (<2) /
#                 not_evaluated (honest floor).
#   repro_gate  → nothing reproduced skips adjudication (seeded empty
#                 channels flow to aggregation), else adjudicate.
#   judging     → cap.diagnose.finding: schema-poka-yoked Findings
#                 (mandatory closed-enum expectedSource; reproduction
#                 copied verbatim, successfulAttempts floor 2; evidence =
#                 opaque refs only) + the separate product_questions
#                 channel for "real observation, no citable expected".
#   aggregating → audit.findings.aggregate: code-computed rollup —
#                 blocking_count, unevidenced_count (independent recount of
#                 the evidence invariants), by_severity, drift_detected.
#
# BROWSER LEASE: `exclusive_pools: [browser]` leases ONE pool member at the
# run boundary, bound run-ambient to $.run.leased.browser — the browser
# caps this flow spawns inherit the SAME leased server process (they also
# declare the pool, per V31; sub-workflows never re-acquire).
#
# The `evidence_clean` outcome gates on unevidenced_count == 0 — a
# CODE-side recount, not the schema's word and not the LLM's. It is seeded
# -1 (honest floor: a run that never reached aggregation must not read as
# clean); only the aggregate script writes 0.
#
# AUTHENTICATION is ONE thread of state, declared once as the optional
# `storage_state` input and threaded to all three steps that need a
# session: the survey, the probe author, and the deterministic replay. It
# is a filesystem PATH to an operator-saved Playwright storage-state file,
# never a credential. Non-empty means "this app is behind auth", which
# turns three otherwise-silent failures loud:
#   - the survey lands on a login page       → auth_gate aborts the run
#   - a probe omits test.use({ storageState }) → refused at emit time by
#     verify.browser.probe-refs, and again at replay by
#     verify.browser.repro-rate (which will NOT run it, because running it
#     would yield an ordinary-looking "0 of 5 reproduced")
#   - the storage-state file is missing      → the replay gate floors the
#     whole run rather than replaying everything signed out
# The second outcome, `fully_evaluated` (not_evaluated_count == 0), is what
# makes the distinction visible in the result: `evidence_clean` is
# satisfied by a run that evaluated NOTHING, so "no defects found" and
# "could not look" need two different scalars to be told apart.
#
# Requires (cognitive/*): cap.plan.test-charter, cap.research.ui-surface,
# cap.diagnose.browser-probe, cap.diagnose.browser-evidence,
# cap.verify.repro-rate, cap.diagnose.finding; scripts
# verify.browser.repro-rate + audit.findings.aggregate; skills
# plan.test.charter + diagnose.browser.finding; a gateway config with a
# `browser` exclusive pool + auto_drive (see examples/qa-explore-run.yaml).
#
# A4 FOLLOW-UP: probes live under `<repo_root>/.praxec/qa-artifacts/`
# because `$.run.artifacts_dir` is not yet an engine scope.
#
# ---------------------------------------------------------------------------
# SCOPE LIMIT: this family requires @playwright/test. Read this before
# pointing it at a repo.
# ---------------------------------------------------------------------------
# The reproduction gate's entire claim to trustworthiness is that a MACHINE
# replays a real spec and a script counts the successes. That machine is
# `npx playwright test --repeat-each=N --workers=1 --reporter=json`. So:
#
#   - The app repo MUST have @playwright/test installed. If it does not, the
#     gate reports `not_evaluated` for everything — honest, but the run
#     produces no findings and `fully_evaluated` is not met.
#   - Repos on cypress, vitest browser mode, .NET/Selenium, or any other
#     runner sit permanently on that floor. It fails safe, never silently,
#     but the family cannot currently test them.
#   - flow.qa.promote-finding additionally requires path-separable
#     `src/**` and `tests/**`; colocated tests are refused outright.
#
# This limitation is DOCUMENTED RATHER THAN ABSTRACTED, deliberately. The
# orchestrator YAML above is already framework-agnostic — only four
# scripts-library bodies bind Playwright, and only in two spots each (the
# invocation and the reporter's stats shape). Generalizing means a
# per-framework adapter with a normalized {attempts, successfulAttempts}
# result contract, and it is not the YAML that makes it expensive: it is
# that every runner reports differently (cypress JSON, vitest JSON, TRX for
# .NET), each needs its own repeat-N mechanism, and each adapter is
# worthless until someone has verified it against a real repo — which is
# the actual cost, not the parsing. A half-generalized adapter that
# mis-parses a reporter would compute successfulAttempts wrong, and a wrong
# reproduction count is strictly worse than an honest not_evaluated: it is
# the one number this whole design refuses to let anyone guess at. Add an
# adapter when a specific non-Playwright repo needs one, verified against
# that repo. Until then the floor tells the truth.

workflows:
  flow.qa.explore:
    lifecycle: experimental
    description: >
      Discovery loop for agentic E2E browser testing: charter a bounded
      mission, survey the app with a leased browser, probe for invariant
      violations minting a replayable Playwright spec per observation,
      collect transport-only evidence, gate every observation through a
      deterministic reproduction replay (>=2 successes), adjudicate
      survivors into schema-poka-yoked Findings vs product questions, and
      aggregate a code-computed QA report.
    exclusive_pools: [browser]
    inputs:
      # The open-ended coverage mission (e.g. "explore checkout for defects").
      mission:  { type: string,  required: true }
      # The app under test (origin the browser caps operate on).
      app_url:  { type: string,  required: true }
      # Replays per probe at the reproduction gate (script floors at 2).
      attempts: { type: integer, default: 5 }
      # Repo-root-relative path to a Playwright storage-state JSON the
      # OPERATOR saved from a hand-driven login:
      #   npx playwright open --save-storage=.praxec/qa-auth.json <app_url>
      # "" means the app declares NO auth. This is a filesystem PATH and
      # never a credential — no password, token, or cookie value belongs in
      # this input or in any YAML. Declared ONCE here and threaded to all
      # three steps that need it (survey, probe authoring, replay), because
      # they are the same thread of session state and splitting it is how
      # you get a survey that logs in and a replay that does not.
      storage_state: { type: string, default: "" }
    outputs:
      findings:          { type: array }
      product_questions: { type: array }
      discarded:         { type: array }
      not_evaluated:     { type: array }
      qa_report:         { type: object }
      unevidenced_count: { type: integer }
      not_evaluated_count: { type: integer }
    # Seed EVERY declared output (V24): the gates can short-circuit past
    # the writers, and the `failed` terminal must still resolve them.
    initialContext:
      findings:          []
      product_questions: []
      discarded:         []
      not_evaluated:     []
      qa_report:         {}
      # -1 = "never aggregated" — the evidence_clean outcome (== 0) must
      # NOT be met by a run that aborted before the code-side recount ran.
      unevidenced_count: -1
      # Same honest-floor seeding, same reason: a run that never reached
      # aggregation must not satisfy `fully_evaluated` (== 0) by default.
      not_evaluated_count: -1
      # Seeded so the survey gate has a value to branch on even if the
      # survey step's contract breaks; "" is not a legal enum member, so
      # the gate's unguarded default catches it.
      auth_state:        ""
    outcomes:
      - id: evidence_clean
        statement: >
          Every emitted Finding survived the code-side evidence recount —
          citable expectedSource, deterministic reproduction >= 2, a
          replayable probe_ref, and at least one opaque evidence ref
          (unevidenced_count == 0, computed by audit.findings.aggregate).
        check: "$.context.unevidenced_count == 0"
      - id: fully_evaluated
        statement: >
          Every observation actually reached the deterministic replay gate
          and got a verdict — nothing was left unevaluated by a missing
          probe file, an uninstalled playwright, or a signed-out replay
          against an authenticated app (not_evaluated_count == 0, computed
          by audit.findings.aggregate). Paired with evidence_clean this is
          what separates "we found no defects" from "we could not look":
          evidence_clean alone is satisfied by a run that evaluated nothing.
        check: "$.context.not_evaluated_count == 0"
    initialState: chartering
    states:

      # Mission → bounded, citable charter (no browser; file-read only).
      chartering:
        goal: Charter the bounded, citable coverage mission.
        transitions:
          charter:
            target: surveying
            actor: deterministic
            executor:
              kind: workflow
              definitionId: cognitive/cap.plan.test-charter
              use:
                inputs:
                  mission:     "$.workflow.input.mission"
                  app_url:     "$.workflow.input.app_url"
                outputs:
                  "$.context.charter": charter

      # Leased-browser survey → the navigation map probing targets.
      surveying:
        goal: Map the app's UI surfaces within the charter's scope.
        transitions:
          survey:
            target: auth_gate
            actor: deterministic
            executor:
              kind: workflow
              definitionId: cognitive/cap.research.ui-surface
              use:
                inputs:
                  charter:       "$.context.charter"
                  app_url:       "$.workflow.input.app_url"
                  storage_state: "$.workflow.input.storage_state"
                outputs:
                  "$.context.surface_map": surface_map
                  "$.context.auth_state":  auth_state

      # Split gate state (guards run BEFORE executors). A survey that never
      # got past a login wall mapped NOTHING — probing it would yield zero
      # observations and the run would render as a clean, defect-free
      # report. That is the silent false negative this whole family exists
      # to not produce, so it aborts instead. Note the direction: this gate
      # only ever routes an inconclusive run to `failed`, never onward into
      # observation or finding territory.
      # The guard grammar has ONE binary operator per expr (no ||), so the
      # closed enum is enumerated arm-by-arm. That is the better shape here
      # anyway: every legal auth_state has its own named, explicit arm, and
      # anything outside the enum can only reach the unguarded default.
      auth_gate:
        transitions:
          open_app:
            target: probing
            actor: deterministic
            guards:
              - { kind: expr, expr: "$.context.auth_state == 'not_required'" }
          signed_in:
            target: probing
            actor: deterministic
            guards:
              - { kind: expr, expr: "$.context.auth_state == 'authenticated'" }
          # Explicit, not a fallthrough: being stuck at the login wall is a
          # DIAGNOSED state with an actionable fix (supply storage_state, or
          # refresh the one you have), not an unexpected contract break.
          login_wall:
            target: failed
            actor: deterministic
            guards:
              - { kind: expr, expr: "$.context.auth_state == 'unauthenticated'" }
          # Unguarded DEFAULT (lowest precedence): a null/absent/empty
          # auth_state means the survey step's contract broke.
          unexpected:
            target: failed
            actor: deterministic

      # Leased-browser probing → observations, each minted as a replayable
      # Playwright spec (probe_ref) — the reproduction gate's only currency.
      probing:
        goal: Probe for invariant violations; mint a replayable probe per observation.
        transitions:
          probe:
            target: probe_gate
            actor: deterministic
            executor:
              kind: workflow
              definitionId: cognitive/cap.diagnose.browser-probe
              use:
                inputs:
                  charter:       "$.context.charter"
                  surface_map:   "$.context.surface_map"
                  app_url:       "$.workflow.input.app_url"
                  storage_state: "$.workflow.input.storage_state"
                outputs:
                  "$.context.observations":      observations
                  "$.context.observation_count": observation_count

      # Split gate state — guards run BEFORE executors, so branching on the
      # probe step's output needs its own state. Zero observations is a
      # CLEAN result: aggregate the seeded empty channels (honest empty
      # report, unevidenced_count 0), don't fail.
      probe_gate:
        transitions:
          observed:
            target: evidencing
            actor: deterministic
            guards:
              - { kind: expr, expr: "$.context.observation_count > 0" }
          none:
            target: aggregating
            actor: deterministic
            guards:
              - { kind: expr, expr: "$.context.observation_count == 0" }
          # Unguarded DEFAULT (lowest precedence): a null/absent count means
          # the probe step's contract broke — abort loudly.
          unexpected:
            target: failed
            actor: deterministic

      # Transport-only evidence per observation (opaque refs, never paths).
      evidencing:
        goal: Collect transport-only diagnostic evidence per observation.
        transitions:
          evidence:
            target: verifying
            actor: deterministic
            executor:
              kind: workflow
              definitionId: cognitive/cap.diagnose.browser-evidence
              use:
                inputs:
                  observations: "$.context.observations"
                outputs:
                  "$.context.evidence": evidence

      # THE deterministic reproduction gate — code replays, code counts.
      verifying:
        goal: Replay every probe deterministically and partition by reproduction rate.
        transitions:
          verify:
            target: repro_gate
            actor: deterministic
            executor:
              kind: workflow
              definitionId: cognitive/cap.verify.repro-rate
              use:
                inputs:
                  observations:  "$.context.observations"
                  attempts:      "$.workflow.input.attempts"
                  storage_state: "$.workflow.input.storage_state"
                outputs:
                  "$.context.reproduced":       reproduced
                  "$.context.discarded":        discarded
                  "$.context.not_evaluated":    not_evaluated
                  "$.context.reproduced_count": reproduced_count
                  "$.context.repro_report":     repro_report

      # Nothing reproduced → skip adjudication; the seeded empty findings /
      # product_questions channels flow to aggregation with the discarded
      # array carrying what didn't survive the gate.
      repro_gate:
        transitions:
          reproduced:
            target: judging
            actor: deterministic
            guards:
              - { kind: expr, expr: "$.context.reproduced_count > 0" }
          none:
            target: aggregating
            actor: deterministic
            guards:
              - { kind: expr, expr: "$.context.reproduced_count == 0" }
          unexpected:
            target: failed
            actor: deterministic

      # Schema-poka-yoked adjudication: Findings vs product questions.
      judging:
        goal: Adjudicate reproduced observations into Findings vs product questions.
        transitions:
          judge:
            target: aggregating
            actor: deterministic
            executor:
              kind: workflow
              definitionId: cognitive/cap.diagnose.finding
              use:
                inputs:
                  charter:    "$.context.charter"
                  reproduced: "$.context.reproduced"
                  evidence:   "$.context.evidence"
                outputs:
                  "$.context.findings":          findings
                  "$.context.product_questions": product_questions

      # Code-computed rollup → the QA report + the scalars outcomes gate on.
      aggregating:
        goal: Aggregate the three channels into the code-computed QA report.
        transitions:
          aggregate:
            target: done
            actor: deterministic
            executor:
              kind: script
              subject: audit.findings.aggregate
              args:
                - "$.context.findings"
                - "$.context.product_questions"
                - "$.context.discarded"
                # The honest floor reaches the report. Without this, a run
                # where nothing could be replayed renders identically to a
                # run that found nothing wrong.
                - "$.context.not_evaluated"
            # Plain script-executor `output:` — LEFT-hand keys are BARE slot
            # names (a `$.context.*`-prefixed key here would write a slot
            # literally named "$.context.qa_report" and leave the real one
            # unset → GUARD_UNSET_SLOT; the flow.audit-docs trap).
            output:
              qa_report:           "$.output.json"
              unevidenced_count:   "$.output.json.unevidenced_count"
              not_evaluated_count: "$.output.json.not_evaluated_count"

      # Terminal: $.context.qa_report is the full report; unevidenced_count
      # is the code-computed definition of evidence_clean.
      done:
        terminal: true
        outcome: success

      # Guard fallthroughs route here — a broken step contract aborts loudly
      # rather than laundering into an empty-but-"clean" report.
      failed:
        terminal: true
        outcome: failure
