# orchestrators/flow.qa.explore.yaml
#
# Agentic E2E browser-testing DISCOVERY loop (M1 vertical slice):
#
#   chartering  → cap.plan.test-charter: mission → bounded, citable charter
#                 (in/out of scope, invariants with sources, budget).
#   surveying   → cap.research.ui-surface: leased-browser delegate maps the
#                 app's surfaces (pages/elements/edges) inside the charter.
#   probing     → cap.diagnose.browser-probe: leased-browser delegate hunts
#                 invariant violations and MINTS each observation as a
#                 machine-replayable Playwright spec (probe_ref) under
#                 `.praxec/qa-artifacts/` (repo-root-relative).
#   probe_gate  → nothing observed short-circuits straight to aggregation
#                 (an honest empty report), else collect evidence.
#   evidencing  → cap.diagnose.browser-evidence: transport-only opaque refs
#                 (console/network/screenshot/trace) per observation.
#   verifying   → cap.verify.repro-rate: THE deterministic reproduction
#                 gate — `playwright test --repeat-each=N --workers=1
#                 --reporter=json` per probe; successfulAttempts computed
#                 IN CODE; partition reproduced (>=2) / discarded (<2) /
#                 not_evaluated (honest floor).
#   repro_gate  → nothing reproduced skips adjudication (seeded empty
#                 channels flow to aggregation), else adjudicate.
#   judging     → cap.diagnose.finding: schema-poka-yoked Findings
#                 (mandatory closed-enum expectedSource; reproduction
#                 copied verbatim, successfulAttempts floor 2; evidence =
#                 opaque refs only) + the separate product_questions
#                 channel for "real observation, no citable expected".
#   aggregating → audit.findings.aggregate: code-computed rollup —
#                 blocking_count, unevidenced_count (independent recount of
#                 the evidence invariants), by_severity, drift_detected.
#
# BROWSER LEASE: `exclusive_pools: [browser]` leases ONE pool member at the
# run boundary, bound run-ambient to $.run.leased.browser — the browser
# caps this flow spawns inherit the SAME leased server process (they also
# declare the pool, per V31; sub-workflows never re-acquire).
#
# The `evidence_clean` outcome gates on unevidenced_count == 0 — a
# CODE-side recount, not the schema's word and not the LLM's. It is seeded
# -1 (honest floor: a run that never reached aggregation must not read as
# clean); only the aggregate script writes 0.
#
# Requires (cognitive/*): cap.plan.test-charter, cap.research.ui-surface,
# cap.diagnose.browser-probe, cap.diagnose.browser-evidence,
# cap.verify.repro-rate, cap.diagnose.finding; scripts
# verify.browser.repro-rate + audit.findings.aggregate; skills
# plan.test.charter + diagnose.browser.finding; a gateway config with a
# `browser` exclusive pool + auto_drive (see examples/qa-explore-run.yaml).
#
# A4 FOLLOW-UP: probes live under `<repo_root>/.praxec/qa-artifacts/`
# because `$.run.artifacts_dir` is not yet an engine scope.

workflows:
  flow.qa.explore:
    lifecycle: experimental
    description: >
      Discovery loop for agentic E2E browser testing: charter a bounded
      mission, survey the app with a leased browser, probe for invariant
      violations minting a replayable Playwright spec per observation,
      collect transport-only evidence, gate every observation through a
      deterministic reproduction replay (>=2 successes), adjudicate
      survivors into schema-poka-yoked Findings vs product questions, and
      aggregate a code-computed QA report.
    exclusive_pools: [browser]
    inputs:
      # The open-ended coverage mission (e.g. "explore checkout for defects").
      mission:  { type: string,  required: true }
      # The app under test (origin the browser caps operate on).
      app_url:  { type: string,  required: true }
      # Replays per probe at the reproduction gate (script floors at 2).
      attempts: { type: integer, default: 5 }
    outputs:
      findings:          { type: array }
      product_questions: { type: array }
      discarded:         { type: array }
      qa_report:         { type: object }
      unevidenced_count: { type: integer }
    # Seed EVERY declared output (V24): the gates can short-circuit past
    # the writers, and the `failed` terminal must still resolve them.
    initialContext:
      findings:          []
      product_questions: []
      discarded:         []
      qa_report:         {}
      # -1 = "never aggregated" — the evidence_clean outcome (== 0) must
      # NOT be met by a run that aborted before the code-side recount ran.
      unevidenced_count: -1
    outcomes:
      - id: evidence_clean
        statement: >
          Every emitted Finding survived the code-side evidence recount —
          citable expectedSource, deterministic reproduction >= 2, a
          replayable probe_ref, and at least one opaque evidence ref
          (unevidenced_count == 0, computed by audit.findings.aggregate).
        check: "$.context.unevidenced_count == 0"
    initialState: chartering
    states:

      # Mission → bounded, citable charter (no browser; file-read only).
      chartering:
        goal: Charter the bounded, citable coverage mission.
        transitions:
          charter:
            target: surveying
            actor: deterministic
            executor:
              kind: workflow
              definitionId: cognitive/cap.plan.test-charter
              use:
                inputs:
                  mission:     "$.workflow.input.mission"
                  app_url:     "$.workflow.input.app_url"
                outputs:
                  "$.context.charter": charter

      # Leased-browser survey → the navigation map probing targets.
      surveying:
        goal: Map the app's UI surfaces within the charter's scope.
        transitions:
          survey:
            target: probing
            actor: deterministic
            executor:
              kind: workflow
              definitionId: cognitive/cap.research.ui-surface
              use:
                inputs:
                  charter: "$.context.charter"
                  app_url: "$.workflow.input.app_url"
                outputs:
                  "$.context.surface_map": surface_map

      # Leased-browser probing → observations, each minted as a replayable
      # Playwright spec (probe_ref) — the reproduction gate's only currency.
      probing:
        goal: Probe for invariant violations; mint a replayable probe per observation.
        transitions:
          probe:
            target: probe_gate
            actor: deterministic
            executor:
              kind: workflow
              definitionId: cognitive/cap.diagnose.browser-probe
              use:
                inputs:
                  charter:     "$.context.charter"
                  surface_map: "$.context.surface_map"
                  app_url:     "$.workflow.input.app_url"
                outputs:
                  "$.context.observations":      observations
                  "$.context.observation_count": observation_count

      # Split gate state — guards run BEFORE executors, so branching on the
      # probe step's output needs its own state. Zero observations is a
      # CLEAN result: aggregate the seeded empty channels (honest empty
      # report, unevidenced_count 0), don't fail.
      probe_gate:
        transitions:
          observed:
            target: evidencing
            actor: deterministic
            guards:
              - { kind: expr, expr: "$.context.observation_count > 0" }
          none:
            target: aggregating
            actor: deterministic
            guards:
              - { kind: expr, expr: "$.context.observation_count == 0" }
          # Unguarded DEFAULT (lowest precedence): a null/absent count means
          # the probe step's contract broke — abort loudly.
          unexpected:
            target: failed
            actor: deterministic

      # Transport-only evidence per observation (opaque refs, never paths).
      evidencing:
        goal: Collect transport-only diagnostic evidence per observation.
        transitions:
          evidence:
            target: verifying
            actor: deterministic
            executor:
              kind: workflow
              definitionId: cognitive/cap.diagnose.browser-evidence
              use:
                inputs:
                  observations: "$.context.observations"
                outputs:
                  "$.context.evidence": evidence

      # THE deterministic reproduction gate — code replays, code counts.
      verifying:
        goal: Replay every probe deterministically and partition by reproduction rate.
        transitions:
          verify:
            target: repro_gate
            actor: deterministic
            executor:
              kind: workflow
              definitionId: cognitive/cap.verify.repro-rate
              use:
                inputs:
                  observations: "$.context.observations"
                  attempts:     "$.workflow.input.attempts"
                outputs:
                  "$.context.reproduced":       reproduced
                  "$.context.discarded":        discarded
                  "$.context.reproduced_count": reproduced_count
                  "$.context.repro_report":     repro_report

      # Nothing reproduced → skip adjudication; the seeded empty findings /
      # product_questions channels flow to aggregation with the discarded
      # array carrying what didn't survive the gate.
      repro_gate:
        transitions:
          reproduced:
            target: judging
            actor: deterministic
            guards:
              - { kind: expr, expr: "$.context.reproduced_count > 0" }
          none:
            target: aggregating
            actor: deterministic
            guards:
              - { kind: expr, expr: "$.context.reproduced_count == 0" }
          unexpected:
            target: failed
            actor: deterministic

      # Schema-poka-yoked adjudication: Findings vs product questions.
      judging:
        goal: Adjudicate reproduced observations into Findings vs product questions.
        transitions:
          judge:
            target: aggregating
            actor: deterministic
            executor:
              kind: workflow
              definitionId: cognitive/cap.diagnose.finding
              use:
                inputs:
                  charter:    "$.context.charter"
                  reproduced: "$.context.reproduced"
                  evidence:   "$.context.evidence"
                outputs:
                  "$.context.findings":          findings
                  "$.context.product_questions": product_questions

      # Code-computed rollup → the QA report + the scalars outcomes gate on.
      aggregating:
        goal: Aggregate the three channels into the code-computed QA report.
        transitions:
          aggregate:
            target: done
            actor: deterministic
            executor:
              kind: script
              subject: audit.findings.aggregate
              args:
                - "$.context.findings"
                - "$.context.product_questions"
                - "$.context.discarded"
            # Plain script-executor `output:` — LEFT-hand keys are BARE slot
            # names (a `$.context.*`-prefixed key here would write a slot
            # literally named "$.context.qa_report" and leave the real one
            # unset → GUARD_UNSET_SLOT; the flow.audit-docs trap).
            output:
              qa_report:         "$.output.json"
              unevidenced_count: "$.output.json.unevidenced_count"

      # Terminal: $.context.qa_report is the full report; unevidenced_count
      # is the code-computed definition of evidence_clean.
      done:
        terminal: true
        outcome: success

      # Guard fallthroughs route here — a broken step contract aborts loudly
      # rather than laundering into an empty-but-"clean" report.
      failed:
        terminal: true
        outcome: failure
